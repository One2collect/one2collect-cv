<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV upload</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 40px 20px; }
    .wrap { max-width: 640px; margin: 0 auto; background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,.08); }
    h1 { margin-top: 0; }
    label { display: block; font-weight: bold; margin: 16px 0 8px; }
    input, textarea, button { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    textarea { min-height: 120px; resize: vertical; }
    button { margin-top: 20px; background: #111; color: #fff; border: 0; cursor: pointer; font-weight: bold; }
    .small { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Upload je CV</h1>
    <p>Laat je gegevens achter en upload je CV. Je document wordt direct doorgestuurd per e-mail.</p>

    <form action="/upload-cv" method="POST" enctype="multipart/form-data">
      <label for="fullName">Volledige naam</label>
      <input id="fullName" name="fullName" type="text" required />

      <label for="email">E-mailadres</label>
      <input id="email" name="email" type="email" required />

      <label for="phone">Telefoonnummer</label>
      <input id="phone" name="phone" type="text" />

      <label for="message">Bericht</label>
      <textarea id="message" name="message" placeholder="Eventuele toelichting"></textarea>

      <label for="cv">CV uploaden</label>
      <input id="cv" name="cv" type="file" accept=".pdf,.doc,.docx" required />
      <p class="small">Toegestaan: PDF, DOC, DOCX. Maximaal 10 MB.</p>

      <button type="submit">Verstuur CV</button>
    </form>
  </div>
</body>
</html>
